<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布小说</title>
    <!-- 引入layui CSS -->
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* 返回按钮 */
        .back-btn {
            margin-bottom: 20px;
        }
        
        /* 表单样式 */
        .novel-form {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }
        
        .layui-form-item {
            margin-bottom: 25px;
        }
        
        .layui-form-label {
            font-weight: bold;
            color: #333;
            width: 120px;
        }
        
        .layui-input-block {
            margin-left: 150px;
        }
        
        .layui-input, .layui-textarea, .layui-select {
            font-size: 14px;
        }
        
        .layui-textarea {
            resize: vertical;
            min-height: 150px;
        }
        
        /* 封面预览 */
        .cover-preview {
            margin-top: 10px;
            border: 1px dashed #ddd;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        
        .cover-preview img {
            max-width: 200px;
            max-height: 280px;
            object-fit: contain;
        }
        
        /* 表单按钮样式 */
        .form-buttons {
            text-align: center;
            margin-top: 40px;
        }
        
        .form-buttons button {
            margin: 0 10px;
        }
        
        /* 发布选项样式 */
        .publish-options {
            background-color: #fafafa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        
        .publish-options h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #333;
        }
        
        .option-group {
            margin-bottom: 15px;
        }
        
        .option-group label {
            margin-right: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 标题区域 -->
    <div class="header-title">小说发布与讨论论坛</div>
    
    <!-- 导航栏 -->
    <div class="nav-bar">
        <div class="layui-container">
            <ul class="layui-nav" lay-filter="">
                <li class="layui-nav-item"><a href="/index">首页</a></li>
                <li class="layui-nav-item"><a href="/post/list">广场（论坛）</a></li>
                <li class="layui-nav-item layui-this"><a href="/novel/list">小说（排行榜）</a></li>
                <li class="layui-nav-item">
                    <a href="javascript:;" id="welcomeText">欢迎，加载中...</a>
                    <dl class="layui-nav-child">
                        <dd><a href="/profile">个人中心</a></dd>
                        <dd><a href="javascript:;" onclick="logoutConfirm()">退出登录</a></dd>
                    </dl>
                </li>
            </ul>
        </div>
    </div>
    
    <!-- 主内容区域 -->
    <div class="main-container">
        <!-- 返回按钮 -->
        <div class="back-btn">
            <a href="/novel/list" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-left"></i> 返回小说列表</a>
        </div>
        
        <!-- 小说表单 -->
        <form class="novel-form layui-form" id="novelForm">
            <h2 class="form-title" id="formTitle">发布小说</h2>
            
            <input type="hidden" id="novelId" name="id" value="">
            
            <div class="layui-form-item">
                <label class="layui-form-label">小说标题</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" placeholder="请输入小说标题" autocomplete="off" class="layui-input" value="">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">小说封面</label>
                <div class="layui-input-block">
                    <div class="layui-upload">
                        <button type="button" class="layui-btn layui-btn-normal" id="uploadCoverBtn">
                            <i class="layui-icon layui-icon-upload"></i> 上传封面
                        </button>
                        <div class="layui-upload-list">
                            <input type="hidden" id="coverImage" name="coverImage" value="">
                            <div class="cover-preview" id="coverPreview">
                                <img id="coverImagePreview" src="/images/默认图片.jpg" alt="封面预览">
                                <div id="coverText">暂无封面，点击上传</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">小说简介</label>
                <div class="layui-input-block">
                    <textarea name="description" required lay-verify="required" placeholder="请输入小说简介，建议200字以内" class="layui-textarea"></textarea>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">小说状态</label>
                <div class="layui-input-block">
                    <select name="status" lay-verify="required">
                        <option value="0">连载中</option>
                        <option value="1">已完结</option>
                        <option value="2">草稿</option>
                        <option value="3">锁定</option>
                    </select>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">分类</label>
                <div class="layui-input-block" id="categoryCheckboxGroup">
                    <!-- 分类复选框将通过JavaScript动态加载 -->
                    <div class="layui-form-mid layui-word-aux">可多选，点击复选框选择</div>
                </div>
            </div>

            <!-- 发布选项（移除，因为小说没有这些字段） -->
            
            <!-- 表单按钮 -->
            <div class="form-buttons">
                <button type="submit" class="layui-btn layui-btn-normal" lay-submit lay-filter="novelSubmit">发布小说</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="window.location.href='/novel/list'">取消</button>
            </div>
        </form>
    </div>

    <!-- 引入layui JS -->
    <script src="/layui/layui.js"></script>
    <script>
        layui.use(['layer', 'element', 'jquery', 'form', 'upload'], function() {
            var layer = layui.layer;
            var element = layui.element;
            var $ = layui.jquery;
            var form = layui.form;
            var upload = layui.upload;
            
            // 获取URL参数
            function getQueryParam(name) {
                var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
                var r = window.location.search.substr(1).match(reg);
                if (r != null) return decodeURIComponent(r[2]);
                return null;
            }
            
            var novelId = $('#novelId').val();
            var isEdit = novelId != null && novelId.trim() !== '';
            var currentUser = null;
            
            // 退出登录确认函数
            window.logoutConfirm = function() {
                layer.confirm('确定要退出登录吗？', {
                    title: '退出确认',
                    btn: ['确定', '取消']
                }, function(index) {
                    // 点击确定按钮，跳转到退出登录页面
                    window.location.href = '/logout';
                    layer.close(index);
                }, function(index) {
                    // 点击取消按钮，关闭对话框
                    layer.close(index);
                });
            };
            
            // 获取当前登录用户信息
            $.ajax({
                url: '/user/current',
                type: 'GET',
                dataType: 'json',
                success: function(res) {
                    console.log('获取当前用户信息成功:', res);
                    if (res.code === 200 && res.data) {
                        $('#welcomeText').text('欢迎，' + res.data.nickname);
                        currentUser = res.data;
                        
                        // 加载分类列表
                        loadCategories();
                        
                        // 如果是编辑模式，加载小说数据（如果尚未通过Thymeleaf预填充）
                        if (isEdit) {
                            // 检查是否已有数据（通过Thymeleaf预填充）
                            var titleVal = $('input[name="title"]').val();
                            if (!titleVal || titleVal.trim() === '') {
                                // 如果没有标题数据，说明未预填充，需要加载
                                loadNovelData();
                            } else {
                                // 数据已预填充，只需确保分类和封面预览
                                // 分类已在loadCategories中处理
                                // 封面预览
                                var coverImage = $('#coverImage').val();
                                if (coverImage && coverImage.trim() !== '') {
                                    $('#coverImagePreview').attr('src', coverImage);
                                    $('#coverText').hide();
                                }
                            }
                        }
                    } else {
                        $('#welcomeText').text('欢迎，未知用户');
                        console.log('获取当前用户信息失败:', res.message);
                    }
                },
                error: function(xhr, status, error) {
                    $('#welcomeText').text('欢迎，未知用户');
                    console.error('获取当前用户信息请求失败:', error);
                    console.log('响应状态:', status);
                    console.log('响应内容:', xhr.responseText);
                }
            });
            
            // 加载分类列表
            function loadCategories() {
                $.ajax({
                    url: '/category/list',
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var categories = res.data;
                            var $container = $('#categoryCheckboxGroup');
                            // 清空容器，但保留提示文本
                            $container.find('.category-checkbox-item').remove();
                            $.each(categories, function(index, category) {
                                var checkboxId = 'categoryCheckbox_' + category.id;
                                var $item = $('<div class="category-checkbox-item" style="margin-bottom: 10px;">');
                                var $checkbox = $('<input type="checkbox" name="categoryIds" lay-skin="primary" title="' + category.name + '" value="' + category.id + '" id="' + checkboxId + '">');
                                var $label = $('<label for="' + checkboxId + '" style="margin-left: 5px;">' + category.name + '</label>');
                                $item.append($checkbox);
                                $item.append($label);
                                $container.prepend($item);
                            });
                            // 设置选中的分类（如果存在）
                            var selectedCategoriesStr = $container.data('selected-categories');
                            if (selectedCategoriesStr && selectedCategoriesStr.trim() !== '') {
                                var selectedIds = selectedCategoriesStr.split(',').map(id => id.trim());
                                selectedIds.forEach(function(id) {
                                    $container.find('input[value="' + id + '"]').prop('checked', true);
                                });
                            }
                            form.render('checkbox');
                        } else {
                            console.log('加载分类失败:', res.message);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('加载分类请求失败:', error);
                    }
                });
            }

            // 加载小说数据（编辑模式）
            function loadNovelData() {
                $.ajax({
                    url: '/novel/detail/' + novelId,
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var novel = res.data;
                            $('#formTitle').text('编辑小说');
                            $('#novelId').val(novel.id);
                            $('input[name="title"]').val(novel.title);
                            $('textarea[name="description"]').val(novel.description);
                            $('select[name="status"]').val(novel.status);
                            
                            // 分类：后端返回的 categoryIds 数组
                            if (novel.categoryIds && novel.categoryIds.length > 0) {
                                // 设置复选框选中状态
                                var $container = $('#categoryCheckboxGroup');
                                $container.find('input[name="categoryIds"]').prop('checked', false);
                                novel.categoryIds.forEach(function(id) {
                                    $container.find('input[value="' + id + '"]').prop('checked', true);
                                });
                                form.render('checkbox');
                            }
                            
                            // 封面
                            if (novel.coverImage) {
                                $('#coverImage').val(novel.coverImage);
                                $('#coverImagePreview').attr('src', novel.coverImage);
                                $('#coverText').hide();
                            }
                            
                            form.render();
                        } else {
                            layer.msg('加载小说数据失败: ' + res.message, {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('加载小说数据请求失败:', error);
                        layer.msg('加载小说数据失败', {icon: 2});
                    }
                });
            }
            
            // 封面上传
            var uploadInst = upload.render({
                elem: '#uploadCoverBtn',
                url: '/upload/cover',
                accept: 'images',
                acceptMime: 'image/*',
                exts: 'jpg|png|jpeg|gif|bmp',
                size: 5 * 1024, // 5MB
                before: function(obj) {
                    // 预读本地文件示例，不支持ie8
                    obj.preview(function(index, file, result) {
                        $('#coverImagePreview').attr('src', result);
                        $('#coverText').hide();
                    });
                },
                done: function(res) {
                    // 上传成功
                    if (res.code === 200) {
                        // res.data 是字符串URL
                        $('#coverImage').val(res.data);
                        layer.msg('封面上传成功', {icon: 1});
                    } else {
                        layer.msg(res.message || '封面上传失败', {icon: 2});
                    }
                },
                error: function() {
                    layer.msg('封面上传失败', {icon: 2});
                }
            });
            
            // 表单验证和提交
            form.on('submit(novelSubmit)', function(data) {
                var formData = data.field;
                console.log('表单数据:', formData);
                
                // 如果没有封面，使用默认封面
                if (!formData.coverImage) {
                    formData.coverImage = '/images/默认图片.jpg';
                }
                
                // 手动收集选中的分类ID
                var selectedCategoryIds = [];
                $('#categoryCheckboxGroup input[name="categoryIds"]:checked').each(function() {
                    selectedCategoryIds.push(parseInt($(this).val(), 10));
                });
                formData.categoryIds = selectedCategoryIds;
                
                var url = isEdit ? '/novel/update' : '/novel/create';
                var method = isEdit ? 'PUT' : 'POST';
                
                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function(res) {
                        if (res.code === 200) {
                            layer.msg(isEdit ? '小说更新成功！' : '小说发布成功！', {icon: 1}, function() {
                                window.location.href = '/novel/list';
                            });
                        } else {
                            layer.msg(res.message || (isEdit ? '小说更新失败' : '小说发布失败'), {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        layer.msg((isEdit ? '小说更新失败：' : '小说发布失败：') + error, {icon: 2});
                        console.error('请求失败:', error);
                    }
                });
                
                return false; // 阻止表单默认提交
            });
        });
    </script>
</body>
</html>
