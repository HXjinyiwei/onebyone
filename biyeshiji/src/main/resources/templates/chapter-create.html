<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${chapter != null ? '编辑章节' : '发布章节'}">发布章节 - 小说发布与讨论论坛</title>
    <!-- 引入layui CSS -->
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* 返回按钮 */
        .back-btn {
            margin-bottom: 20px;
        }
        
        /* 表单样式 */
        .chapter-form {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }
        
        .layui-form-item {
            margin-bottom: 25px;
        }
        
        .layui-form-label {
            font-weight: bold;
            color: #333;
            width: 120px;
        }
        
        .layui-input-block {
            margin-left: 150px;
        }
        
        .layui-input, .layui-textarea, .layui-select {
            font-size: 14px;
        }
        
        .layui-textarea {
            resize: vertical;
            min-height: 400px;
        }
        
        /* 表单按钮样式 */
        .form-buttons {
            text-align: center;
            margin-top: 40px;
        }
        
        .form-buttons button {
            margin: 0 10px;
        }
        

    </style>
</head>
<body>
    <!-- 标题区域 -->
    <div class="header-title">小说发布与讨论论坛</div>
    
    <!-- 导航栏 -->
    <div class="nav-bar">
        <div class="layui-container">
            <ul class="layui-nav" lay-filter="">
                <li class="layui-nav-item"><a href="/index">首页</a></li>
                <li class="layui-nav-item"><a href="/post/list">广场（论坛）</a></li>
                <li class="layui-nav-item layui-this"><a href="/novel/list">小说（排行榜）</a></li>
                <li class="layui-nav-item admin-menu" style="display: none;"><a href="/admin">管理后台</a></li>
                <li class="layui-nav-item">
                    <a href="javascript:;" id="welcomeText">欢迎，加载中...</a>
                    <dl class="layui-nav-child">
                        <dd><a href="/profile">个人中心</a></dd>
                        <dd><a href="javascript:;" onclick="logoutConfirm()">退出登录</a></dd>
                    </dl>
                    <!-- 红点消息提示 -->
                    <div id="messageBadge" class="message-badge hidden"></div>
                </li>
            </ul>
        </div>
    </div>
    
    <!-- 主内容区域 -->
    <div class="main-container">
        <!-- 返回按钮 -->
        <div class="back-btn">
            <a href="#" id="backLink" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-left"></i> 返回小说详情</a>
        </div>
        
        <!-- 章节表单 -->
        <form class="chapter-form layui-form" id="chapterForm">
            <h2 class="form-title" id="formTitle">发布章节</h2>
            
            <input type="hidden" id="chapterId" name="id" th:value="${chapter != null} ? ${chapter.id} : ''">
            <input type="hidden" id="novelId" name="novelId" th:value="${novelId != null} ? ${novelId} : ''">
            
            <div class="layui-form-item">
                <label class="layui-form-label">章节标题</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" placeholder="请输入章节标题" autocomplete="off" class="layui-input" th:value="${chapter != null} ? ${chapter.title} : ''">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">章节号</label>
                <div class="layui-input-block">
                    <input type="number" name="sortOrder" required lay-verify="required|number" placeholder="请输入章节号（正整数）" autocomplete="off" class="layui-input" min="1" th:value="${chapter != null} ? ${chapter.sortOrder} : ''">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">章节内容</label>
                <div class="layui-input-block">
                    <textarea name="content" required lay-verify="required" placeholder="请输入章节内容，支持HTML格式" class="layui-textarea" th:text="${chapter != null} ? ${chapter.content} : ''"></textarea>
                </div>
            </div>
            

            

            
            <!-- 表单按钮 -->
            <div class="form-buttons">
                <button type="submit" class="layui-btn layui-btn-normal" lay-submit lay-filter="chapterSubmit">发布章节</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="window.location.href='/novel/list'">取消</button>
            </div>
        </form>
    </div>

    <!-- 引入layui JS -->
    <script src="/layui/layui.js"></script>
    <script>
        layui.use(['layer', 'element', 'jquery', 'form'], function() {
            var layer = layui.layer;
            var element = layui.element;
            var $ = layui.jquery;
            var form = layui.form;
            
            // 获取URL参数
            function getQueryParam(name) {
                var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
                var r = window.location.search.substr(1).match(reg);
                if (r != null) return decodeURIComponent(r[2]);
                return null;
            }
            
            var chapterId = getQueryParam('id');
            var novelId = getQueryParam('novelId');
            var isEdit = chapterId != null;
            var currentUser = null;
            
            if (!novelId) {
                layer.msg('缺少小说ID', {icon: 2}, function() {
                    window.location.href = '/novel/list';
                });
            }
            
            // 设置隐藏字段
            $('#novelId').val(novelId);
            
            // 退出登录确认函数
            window.logoutConfirm = function() {
                layer.confirm('确定要退出登录吗？', {
                    title: '退出确认',
                    btn: ['确定', '取消']
                }, function(index) {
                    // 点击确定按钮，跳转到退出登录页面
                    window.location.href = '/logout';
                    layer.close(index);
                }, function(index) {
                    // 点击取消按钮，关闭对话框
                    layer.close(index);
                });
            };
            
            // 获取当前登录用户信息
            $.ajax({
                url: '/user/current',
                type: 'GET',
                dataType: 'json',
                success: function(res) {
                    console.log('获取当前用户信息成功:', res);
                    if (res.code === 200 && res.data) {
                        $('#welcomeText').text('欢迎，' + res.data.nickname);
                        currentUser = res.data;
                        // 如果是管理员或高级管理员，显示管理后台菜单
                        if (res.data.role === 1 || res.data.role === 2) {
                            $('.admin-menu').show();
                        }
                        
                        // 加载小说信息
                        loadNovelInfo();
                        
                        // 如果是编辑模式，加载章节数据
                        if (isEdit) {
                            loadChapterData();
                        }
                    } else {
                        $('#welcomeText').text('欢迎，未知用户');
                        console.log('获取当前用户信息失败:', res.message);
                    }
                },
                error: function(xhr, status, error) {
                    $('#welcomeText').text('欢迎，未知用户');
                    console.error('获取当前用户信息请求失败:', error);
                    console.log('响应状态:', status);
                    console.log('响应内容:', xhr.responseText);
                }
            });
            
            // 加载小说信息
            function loadNovelInfo() {
                $.ajax({
                    url: '/novel/detail/' + novelId,
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var novel = res.data;
                            $('#backLink').attr('href', '/novel/detail/' + novel.id);
                            $('#formTitle').text((isEdit ? '编辑章节' : '发布章节') + ' - ' + novel.title);
                        } else {
                            layer.msg('加载小说信息失败: ' + res.message, {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('加载小说信息请求失败:', error);
                        layer.msg('加载小说信息失败', {icon: 2});
                    }
                });
            }
            
            // 加载章节数据（编辑模式）
            function loadChapterData() {
                // 如果章节ID隐藏字段已有值且标题已填充，则跳过AJAX（Thymeleaf已预填充）
                var existingTitle = $('input[name="title"]').val();
                if (existingTitle && existingTitle.trim() !== '') {
                    console.log('章节数据已预填充，跳过AJAX加载');
                    // 确保表单渲染
                    form.render();
                    return;
                }
                $.ajax({
                    url: '/chapter/detail/' + chapterId,
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var chapter = res.data;
                            $('#chapterId').val(chapter.id);
                            $('input[name="title"]').val(chapter.title);
                            $('input[name="sortOrder"]').val(chapter.sortOrder); // 使用sortOrder字段
                            $('textarea[name="content"]').val(chapter.content);
                            // 注意：chapter 实体没有 status、isLocked、isVip 字段，因此跳过设置
                            // $('select[name="status"]').val(chapter.status);
                            // $('input[name="isLocked"][value="' + (chapter.isLocked ? 1 : 0) + '"]').prop('checked', true);
                            // $('input[name="isVip"]').prop('checked', chapter.isVip);
                            
                            form.render();
                        } else {
                            layer.msg('加载章节数据失败: ' + res.message, {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('加载章节数据请求失败:', error);
                        layer.msg('加载章节数据失败', {icon: 2});
                    }
                });
            }
            
            // 表单验证和提交
            form.on('submit(chapterSubmit)', function(data) {
                var formData = data.field;
                console.log('表单数据:', formData);
                
                // 转换类型
                formData.sortOrder = parseInt(formData.sortOrder);
                // 注意：Chapter实体没有isLocked和isVip字段，因此移除这些转换
                // formData.isLocked = formData.isLocked === '1';
                // formData.isVip = formData.isVip === 'on';
                
                var url = isEdit ? '/chapter/update' : '/chapter/create';
                var method = isEdit ? 'PUT' : 'POST';
                
                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function(res) {
                        if (res.code === 200) {
                            layer.msg(isEdit ? '章节更新成功！' : '章节发布成功！', {icon: 1}, function() {
                                window.location.href = '/novel/detail/' + novelId;
                            });
                        } else {
                            layer.msg(res.message || (isEdit ? '章节更新失败' : '章节发布失败'), {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        layer.msg((isEdit ? '章节更新失败：' : '章节发布失败：') + error, {icon: 2});
                        console.error('请求失败:', error);
                    }
                });
                
                return false; // 阻止表单默认提交
            });
            
            // 红点消息提示功能
            var messageBadgeInterval = null;
            
            // 初始化红点功能
            function initMessageBadge() {
                if (currentUser && currentUser.id) {
                    // 立即获取未读消息数
                    fetchUnreadMessageCount(currentUser.id);
                    
                    // 设置定时轮询（每30秒）
                    messageBadgeInterval = setInterval(() => {
                        fetchUnreadMessageCount(currentUser.id);
                    }, 30000);
                }
            }
            
            // 获取未读消息数
            function fetchUnreadMessageCount(userId) {
                if (!userId) return;
                
                $.ajax({
                    url: '/message/unread-count/' + userId,
                    type: 'GET',
                    success: function(res) {
                        if (res.code === 200) {
                            updateMessageBadge(res.data);
                        }
                    }
                });
            }
            
            // 更新红点显示
            function updateMessageBadge(count) {
                var $badge = $('#messageBadge');
                if (count > 0) {
                    $badge.removeClass('hidden');
                    $badge.text(count > 99 ? '99+' : count);
                    if (count > 9) $badge.addClass('large');
                    else $badge.removeClass('large');
                } else {
                    $badge.addClass('hidden');
                }
            }
            
            // 页面卸载时清理定时器
            $(window).on('beforeunload', function() {
                if (messageBadgeInterval) {
                    clearInterval(messageBadgeInterval);
                }
            });
            
            // 初始化红点功能
            setTimeout(function() {
                initMessageBadge();
            }, 1000);
        });
    </script>
</body>
</html>
