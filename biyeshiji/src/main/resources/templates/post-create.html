<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布帖子 - 小说发布与讨论论坛</title>
    <!-- 引入layui CSS -->
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* 表单样式 */
        .post-form {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }
        
        .layui-form-item {
            margin-bottom: 25px;
        }
        
        .layui-form-label {
            font-weight: bold;
            color: #333;
        }
        
        .layui-input, .layui-textarea, .layui-select {
            font-size: 14px;
        }
        
        .layui-textarea {
            resize: vertical;
            min-height: 300px;
        }
        
        /* 表单按钮样式 */
        .form-buttons {
            text-align: center;
            margin-top: 40px;
        }
        
        .form-buttons button {
            margin: 0 10px;
        }
        

    </style>
</head>
<body>
    <!-- 标题区域 -->
    <div class="header-title">小说发布与讨论论坛</div>
    
    <!-- 导航栏 -->
    <div class="nav-bar">
        <div class="layui-container">
            <ul class="layui-nav" lay-filter="">
                <li class="layui-nav-item"><a href="/index">首页</a></li>
                <li class="layui-nav-item layui-this"><a href="/post/list">广场（论坛）</a></li>
                <li class="layui-nav-item"><a href="/novel/list">小说（排行榜）</a></li>
                <li class="layui-nav-item admin-menu" style="display: none;"><a href="/admin">管理后台</a></li>
                <li class="layui-nav-item">
                    <a href="javascript:;" id="welcomeText">欢迎，加载中...</a>
                    <dl class="layui-nav-child">
                        <dd><a href="/profile">个人中心</a></dd>
                        <dd><a href="javascript:;" onclick="logoutConfirm()">退出登录</a></dd>
                    </dl>
                    <!-- 红点消息提示 -->
                    <div id="messageBadge" class="message-badge hidden"></div>
                </li>
            </ul>
        </div>
    </div>
    
    <!-- 主内容区域 -->
    <div class="main-container">
        <!-- 返回按钮 -->
        <div class="back-btn" style="margin-bottom: 20px;">
            <a href="/post/list" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-left"></i> 返回帖子列表</a>
        </div>
        
        <!-- 发帖表单 -->
        <form class="post-form layui-form" id="postForm">
            <h2 class="form-title" id="formTitle">发布帖子</h2>
            
            <input type="hidden" id="postId" name="id" th:value="${postId}">
            
            <div class="layui-form-item">
                <label class="layui-form-label">帖子标题</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required  lay-verify="required" placeholder="请输入帖子标题" autocomplete="off" class="layui-input">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">帖子分类</label>
                <div class="layui-input-block">
                    <select name="categoryId" lay-verify="required" id="categorySelect">
                        <option value="">请选择分类</option>
                        <!-- 分类选项将通过JavaScript动态加载 -->
                    </select>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">帖子内容</label>
                <div class="layui-input-block">
                    <textarea name="content" required lay-verify="required" placeholder="请输入帖子内容" class="layui-textarea"></textarea>
                </div>
            </div>
            
            <!-- 拒绝原因显示区域（通过JavaScript动态添加） -->
            <div id="rejectReasonContainer" style="display: none;">
                <div class="layui-form-item">
                    <label class="layui-form-label">拒绝原因</label>
                    <div class="layui-input-block">
                        <div class="layui-card" style="background-color: #fff5f5; border-left: 4px solid #ff5722;">
                            <div class="layui-card-body">
                                <p style="color: #ff5722; font-weight: bold; margin-bottom: 5px;">
                                    <i class="layui-icon layui-icon-close-fill"></i> 审核被拒绝
                                </p>
                                <p id="rejectReasonText" style="color: #666; margin: 0;"></p>
                                <p style="color: #999; font-size: 12px; margin-top: 5px;">
                                    请根据上述原因修改内容后重新提交审核
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 表单按钮 -->
            <div class="form-buttons">
                <button type="submit" class="layui-btn layui-btn-normal" lay-submit lay-filter="postSubmit">发布帖子</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="window.location.href='/post/list'">取消</button>
            </div>
        </form>
    </div>

    <!-- 引入layui JS -->
    <script src="/layui/layui.js"></script>
    <script>
        layui.use(['layer', 'element', 'jquery', 'form'], function() {
            var layer = layui.layer;
            var element = layui.element;
            var $ = layui.jquery;
            var form = layui.form;
            
            var postId = $('#postId').val();
            var isEdit = postId != null && postId.trim() !== '';
            var currentUser = null;
            
            // 退出登录确认函数
            window.logoutConfirm = function() {
                layer.confirm('确定要退出登录吗？', {
                    title: '退出确认',
                    btn: ['确定', '取消']
                }, function(index) {
                    // 点击确定按钮，跳转到退出登录页面
                    window.location.href = '/logout';
                    layer.close(index);
                }, function(index) {
                    // 点击取消按钮，关闭对话框
                    layer.close(index);
                });
            };
            
            // 获取当前登录用户信息
            $.ajax({
                url: '/user/current',
                type: 'GET',
                dataType: 'json',
                success: function(res) {
                    console.log('获取当前用户信息成功:', res);
                    if (res.code === 200 && res.data) {
                        $('#welcomeText').text('欢迎，' + res.data.nickname);
                        currentUser = res.data;
                        
                        // 加载帖子分类
                        loadPostCategories(res.data.role);
                        
                        // 如果是编辑模式，加载帖子数据
                        if (isEdit) {
                            loadPostData();
                        }
                    } else {
                        $('#welcomeText').text('欢迎，未知用户');
                        console.log('获取当前用户信息失败:', res.message);
                        // 仍然尝试加载分类
                        loadPostCategories(0);
                        // 如果是编辑模式，仍然尝试加载帖子数据
                        if (isEdit) {
                            loadPostData();
                        }
                    }
                },
                error: function(xhr, status, error) {
                    $('#welcomeText').text('欢迎，未知用户');
                    console.error('获取当前用户信息请求失败:', error);
                    console.log('响应状态:', status);
                    console.log('响应内容:', xhr.responseText);
                    // 仍然尝试加载分类
                    loadPostCategories(0);
                    // 如果是编辑模式，仍然尝试加载帖子数据
                    if (isEdit) {
                        loadPostData();
                    }
                }
            });
            
            // 加载帖子分类（type=0）
            function loadPostCategories(userRole) {
                $.ajax({
                    url: '/category/active/type/0',
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var categories = res.data;
                            var $select = $('#categorySelect');
                            // 清空现有选项（保留第一个"请选择分类"选项）
                            $select.find('option:not(:first)').remove();
                            
                            // 添加分类选项
                            categories.forEach(function(category) {
                                $select.append('<option value="' + category.id + '">' + category.name + '</option>');
                            });
                            
                            // 如果是管理员，添加公告分类选项（放在最前面）
                            if (userRole === 1 || userRole === 2) {
                                $select.prepend('<option value="1">公告</option>');
                            }
                            
                            // 重新渲染表单
                            form.render('select');
                            console.log('加载帖子分类成功，数量:', categories.length);
                        } else {
                            console.log('加载分类失败:', res.message);
                            // 如果新接口失败，回退到硬编码选项
                            fallbackCategories(userRole);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('加载分类请求失败:', error);
                        // 如果新接口失败，回退到硬编码选项
                        fallbackCategories(userRole);
                    }
                });
            }
            
            // 回退到硬编码分类选项
            function fallbackCategories(userRole) {
                var $select = $('#categorySelect');
                $select.find('option:not(:first)').remove();
                
                // 添加默认分类选项
                $select.append('<option value="2">讨论</option>');
                $select.append('<option value="3">求助</option>');
                $select.append('<option value="4">分享</option>');
                $select.append('<option value="5">灌水</option>');
                $select.append('<option value="6">分享</option>');
                
                // 如果是管理员，添加公告分类选项
                if (userRole === 1 || userRole === 2) {
                    $select.prepend('<option value="1">公告</option>');
                }
                
                form.render('select');
                console.log('使用回退分类选项');
            }
            
            // 加载帖子数据（编辑模式）
            function loadPostData() {
                $.ajax({
                    url: '/post/detail/' + postId,
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var post = res.data;
                            $('#formTitle').text('编辑帖子');
                            $('input[name="title"]').val(post.title);
                            $('textarea[name="content"]').val(post.content);
                            $('select[name="categoryId"]').val(post.categoryId);
                            
                            // 设置状态
                            if (post.status === 0) {
                                $('input[name="status"][value="0"]').prop('checked', true);
                            } else {
                                $('input[name="status"][value="1"]').prop('checked', true);
                            }
                            
                            // 设置锁定状态
                            if (post.isLocked === 1) {
                                $('input[name="isLocked"]').prop('checked', true);
                            }
                            
                            // 显示拒绝原因（如果存在）
                            if (post.rejectReason && post.rejectReason.trim() !== '') {
                                $('#rejectReasonText').text(post.rejectReason);
                                $('#rejectReasonContainer').show();
                            }
                            
                            form.render();
                            console.log('帖子数据加载成功');
                        } else {
                            layer.msg('加载帖子数据失败: ' + res.message, {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('加载帖子数据请求失败:', error);
                        layer.msg('加载帖子数据失败', {icon: 2});
                    }
                });
            }
            
            // 表单验证和提交
            form.on('submit(postSubmit)', function(data) {
                // 这里可以添加异步请求，提交表单数据
                console.log('表单数据:', data.field);
                
                var formData = data.field;
                
                // 如果是编辑模式且帖子处于拒绝状态（status=2），则自动设置为审核中状态（status=1）
                if (isEdit) {
                    // 需要先获取当前帖子的状态
                    // 为了简化，我们假设如果显示了拒绝原因，那么帖子就是被拒绝的
                    if ($('#rejectReasonContainer').is(':visible')) {
                        formData.status = 1; // 设置为审核中
                        console.log('检测到帖子处于拒绝状态，自动设置为审核中状态');
                    }
                }
                
                var url = isEdit ? '/post/update' : '/post/create';
                var method = 'POST'; // 两个端点都使用POST方法
                
                // 实际提交到后端API
                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function(res) {
                        if (res.code === 200) {
                            layer.msg(isEdit ? '帖子更新成功！' : '帖子发布成功！', {icon: 1}, function() {
                                window.location.href = '/post/list';
                            });
                        } else {
                            layer.msg(res.message || (isEdit ? '帖子更新失败' : '帖子发布失败'), {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        layer.msg((isEdit ? '帖子更新失败：' : '帖子发布失败：') + error, {icon: 2});
                        console.error('帖子发布请求失败:', error);
                    }
                });
                
                 return false; // 阻止表单默认提交
             });
             
             // 红点消息提示功能
             var messageBadgeInterval = null;
             
             // 初始化红点功能
             function initMessageBadge() {
                 if (currentUser && currentUser.id) {
                     // 立即获取未读消息数
                     fetchUnreadMessageCount(currentUser.id);
                     
                     // 设置定时轮询（每30秒）
                     messageBadgeInterval = setInterval(() => {
                         fetchUnreadMessageCount(currentUser.id);
                     }, 30000);
                 }
             }
             
             // 获取未读消息数
             function fetchUnreadMessageCount(userId) {
                 if (!userId) return;
                 
                 $.ajax({
                     url: '/message/unread-count/' + userId,
                     type: 'GET',
                     success: function(res) {
                         if (res.code === 200) {
                             updateMessageBadge(res.data);
                         }
                     }
                 });
             }
             
             // 更新红点显示
             function updateMessageBadge(count) {
                 var $badge = $('#messageBadge');
                 if (count > 0) {
                     $badge.removeClass('hidden');
                     $badge.text(count > 99 ? '99+' : count);
                     if (count > 9) $badge.addClass('large');
                     else $badge.removeClass('large');
                 } else {
                     $badge.addClass('hidden');
                 }
             }
             
             // 页面卸载时清理定时器
             $(window).on('beforeunload', function() {
                 if (messageBadgeInterval) {
                     clearInterval(messageBadgeInterval);
                 }
             });
             
             // 初始化红点功能
             setTimeout(function() {
                 initMessageBadge();
             }, 1000);
         });
     </script>
</body>
</html>
